name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd Gym-Backend && npm ci && npm run lint
      - run: cd Gym-Frontend && npm ci && npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gym_dashboard
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd Gym-Backend && npm ci
      - run: cd Gym-Backend && npm test
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: gym_dashboard
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret
