services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gym_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_1}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: Gym-Backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: gym_dashboard
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres_1}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: Gym-Frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
